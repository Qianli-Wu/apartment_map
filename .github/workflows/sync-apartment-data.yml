name: Sync Apartment Data

on:
  push:
    branches:
      - main
    paths:
      - "output/spreadsheet/apartment_research_latest.csv"
      - "tools/sync_apartment_data.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate site data
        run: python3 tools/sync_apartment_data.py

      - name: Commit generated JSON
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/apartments-data.json map/apartments-data.json
          git commit -m "Sync apartment JSON from latest CSV"
          git push
